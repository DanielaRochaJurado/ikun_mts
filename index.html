<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>MTS Sílabas</title>

  <script src="https://unpkg.com/jspsych@7.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.1"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://unpkg.com/jspsych@7.2.1/css/jspsych.css" rel="stylesheet" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: #c6c6c6;
      color: rgb(25, 27, 1);
      font-family: Arial, Helvetica, sans-serif;
    }

    #jspsych-target {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      /* centra vertical */
      justify-content: center;
      /* centra horizontal */
    }

    .jspsych-content {
      max-width: 90vw;
      max-height: 90vh;
      text-align: center;
    }

    .syll {
      font-size: 22px;
      padding: 20px;
      margin: 10px;
    }
  </style>
</head>

<body>
  <div id="jspsych-target"></div>

  <script>


    /* ================= GENERAL ================= */
    const jsPsych = initJsPsych({
      display_element: "jspsych-target",
      on_finish: () => {
        const participant_id =
          jsPsych.data.get().values()[0]?.participant_id || "unknown";

        exportDataToExcel(participant_id);

      }
    });

    function speak(text) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "es-ES";
      u.rate = 0.8;
      speechSynthesis.speak(u);
    }

    function violatesRules(seq, max_gap = 5) {
      const lastSeen = {};

      for (let i = 0; i < seq.length; i++) {
        const s = seq[i].sample;

        if (lastSeen[s] !== undefined) {
          const gap = i - lastSeen[s];
          if (gap > max_gap) return true;
        }

        lastSeen[s] = i;
      }

      return false;
    }

    function buildSession(stimSet, reps = 6) {
      let trials = [];

      stimSet.forEach(stim => {
        for (let i = 0; i < reps; i++) {
          trials.push({
            sample: stim.sample,
            correct: stim.correct,
            comparisons: jsPsych.randomization.shuffle([...stim.comparisons])
          });
        }
      });

      let shuffled;
      let attempts = 0;

      do {
        shuffled = jsPsych.randomization.shuffle(trials);
        attempts++;
        if (attempts > 500) {
          console.warn("No se pudo cumplir con las restricciones");
          break;
        }
      } while (violatesRules(shuffled, 5));

      return shuffled;
    }

    const participant_id_trial = {
      type: jsPsychSurveyText,
      questions: [{
        prompt: "Ingrese su ID de participante:",
        name: "participant_id",
        required: true
      }],
      on_finish: data => {
        jsPsych.data.addProperties({
          participant_id: data.response.participant_id
        });
      }
    };

    /* ================= SILABAS ================= */

    const treino_blocos = [

      { sample: "be", comparisons: ["ba", "cha", "be", "gʉ"], correct: "be" },
      { sample: "cha", comparisons: ["bo", "bʉ", "ce", "cha"], correct: "cha" },
      { sample: "di", comparisons: ["di", "dä", "bi", "go"], correct: "di" },
      { sample: "fo", comparisons: ["fo", "fe", "cho", "cha"], correct: "fo" },
      { sample: "gä", comparisons: ["gä", "ge", "fä", "de"], correct: "gä" },

      { sample: "ja", comparisons: ["mo", "ja", "me", "jo"], correct: "ja" },
      { sample: "ku", comparisons: ["ki", "ku", "ji", "lʉ"], correct: "ku" },
      { sample: "llo", comparisons: ["ko", "lle", "llo", "mä"], correct: "llo" },
      { sample: "mu", comparisons: ["ja", "me", "mu", "ku"], correct: "mu" },

      { sample: "na", comparisons: ["na", "pa", "ne", "zo"], correct: "na" },
      { sample: "pe", comparisons: ["po", "pe", "ne", "za"], correct: "pe" },
      { sample: "zi", comparisons: ["zi", "zä", "ni", "rʉ"], correct: "zi" },
      { sample: "rä", comparisons: ["rä", "rʉ", "po", "na"], correct: "rä" },
      { sample: "se", comparisons: ["nʉ", "se", "sa", "re"], correct: "se" },

      { sample: "ta", comparisons: ["ta", "va", "te", "yo"], correct: "ta" },
      { sample: "ve", comparisons: ["yo", "te", "ve", "vä"], correct: "ve" },
      { sample: "ya", comparisons: ["va", "te", "ya", "ye"], correct: "ya" },
    ];

    let data_rows = [];

    function mts_trial(trial, session_id) {
      return {
        type: jsPsychHtmlKeyboardResponse,
        choices: "NO_KEYS",

        stimulus: `
      <div style="margin-bottom:30px;">
        <button id="play-sample" class="jspsych-btn"
        style="width:120px;height:120px;font-size:30px;"></button>
      </div>

      <div id="comparisons" style="display:none;">
        ${trial.comparisons.map(c =>
          `<button class="jspsych-btn syll" data-choice="${c}">${c}</button>`
        ).join("")}
      </div>
    `,

        on_load: () => {

          const t0 = performance.now();

          const playBtn = document.querySelector("#play-sample");
          const compDiv = document.querySelector("#comparisons");

          playBtn.onclick = () => {

            speak(trial.sample);

            // evitar múltiples clics
            playBtn.disabled = true;

            // mostrar comparaciones después de 0.5 s
            setTimeout(() => {
              compDiv.style.display = "block";
            }, 500);

          };

          document.querySelectorAll(".syll").forEach(btn => {
            btn.onclick = () => {

              const choice = btn.dataset.choice;

              jsPsych.finishTrial({
                task: "mts",
                session: session_id,
                sample: trial.sample,
                comparisons: trial.comparisons,
                response: choice,
                correct: choice === trial.correct ? 1 : 0,
                rt: performance.now() - t0
              });

            };
          });

        },

        on_finish: data => {

          session_trials++;

          if (data.correct === 1) {
            session_correct++;
          }
          data_rows.push(
            {
              participant_id: jsPsych.data.get().values()[0].participant_id,
              session: currentSession,
              sample: data.sample,

              comparisons1: data.comparisons[0],
              comparisons2: data.comparisons[1],
              comparisons3: data.comparisons[2],
              comparisons4: data.comparisons[3],

              response: data.response,
              correct: data.correct,
              rt: data.rt,
              task: "silabas"

            }
          );

        }
      };
    }

    const feedback_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: () => {
        const last = jsPsych.data.get().last(1).values()[0];
        return last.correct === 1
          ? "<div style='font-size:60px'>🏔️🐚</div>"
          : "<div style='font-size:60px'>.</div>";
      },
      choices: "NO_KEYS",
      trial_duration: 800
    };

    /* ================= Bloque ================= */

    let session_id = 0;
    let currentSession = 1;

    let trials_per_session = 0;
    let session_correct = 0;
    let session_trials = 0;

    function buildTrainingSession() {
      session_id++;
      session_correct = 0;
      session_trials = 0;

      const trials = buildSession(treino_blocos, 6);
      trials_per_session = trials.length;
      return buildBlockTimeline(trials, session_id);
    }

    const training_session = buildTrainingSession();

    const criterion_loop = {

      timeline: training_session,

      loop_function: function () {
        trials_per_session = jsPsych.data.get().filter({ session: session_id }).values().length || trials_per_session;
        const accuracy =
          session_correct / session_trials;

        console.log("session", currentSession);
        console.log("correct", session_correct);
        console.log("trials", session_trials);
        console.log("accuracy", accuracy);

        const repeat = accuracy < 0.8;

        session_correct = 0;
        session_trials = 0;
        if (repeat) {
          session_id++;
          currentSession++;
        }

        return repeat;

      }
    };

    function buildBlockTimeline(session_trials, session_id) {
      if (!Array.isArray(session_trials) || session_trials.length === 0) {
        console.error("Error: session_trials is not a valid array or is empty.", session_trials);
        return [];
      }

      let timeline = [];
      session_trials.forEach(trial => {
        timeline.push(
          mts_trial(trial, session_id),
          feedback_trial
        );
      });
      return timeline;
    }

    const final_message = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p>Fin de la tarea</p>",
      choices: "NO_KEYS",
      trial_duration: 1500
    };


    /* ================= COMPRENSIÓN ================= */

    const comprension = [

      { sample: "🦀", comparisons: ["uti", "sisio", "ziko", "urakʉ"], correct: "uti" },
      { sample: "🛖", comparisons: ["ziko", "urakʉ", "sisio", "uti"], correct: "urakʉ" },
      { sample: "🐛", comparisons: ["urakʉ", "ziko", "uti", "gei"], correct: "ziko" },
      { sample: "🔥", comparisons: ["ziko", "uti", "urakʉ", "gei"], correct: "gei" },

      { sample: "🥣", comparisons: ["trumʉ", "urakʉ", "gei", "zamʉ"], correct: "zamʉ" },
      { sample: "🥔", comparisons: ["kän", "trumʉ", "zamʉ", "mäniu"], correct: "trumʉ" },
      { sample: "🌳", comparisons: ["kän", "zamʉ", "trumʉ", "mäniu"], correct: "kän" },
      { sample: "☁️", comparisons: ["zamʉ", "kän", "urakʉ", "mäniu"], correct: "mäniu" },
      { sample: "🐒", comparisons: ["maku", "zamʉ", "kän", "trumʉ"], correct: "maku" },

      { sample: "🫏", comparisons: ["mura", "misi", "ne", "potiri"], correct: "mura" },
      { sample: "🐈", comparisons: ["misi", "mura", "potiri", "paka"], correct: "misi" },
      { sample: "🐕", comparisons: ["perʉ", "potiri", "mura", "misi"], correct: "perʉ" },
      { sample: "🐄", comparisons: ["paka", "mura", "misi", "potiri"], correct: "paka" },

      { sample: "🐥", comparisons: ["pitu", "chinu", "kumeitʉ", "yutimbiro"], correct: "pitu" },
      { sample: "🐖", comparisons: ["chinu", "pitu", "yutimbiro", "yugu"], correct: "chinu" },
      { sample: "🦇", comparisons: ["chinu", "urakʉ", "yugu", "kumeitʉ"], correct: "yugu" },
      { sample: "⚡️", comparisons: ["kumeitʉ", "yutimbiro", "yugu", "pitu"], correct: "yutimbiro" },

      { sample: "☀️", comparisons: ["tima", "ku'naba", "yevʉ", "yui"], correct: "yui" },
      { sample: "🌓", comparisons: ["ku'naba", "yevʉ", "yui", "tima"], correct: "tima" },
      { sample: "✨", comparisons: ["yevʉ", "yui", "tima", "virakoku"], correct: "virakoku" },
     
      { sample: "🐓", comparisons: ["virakoku", "chivakoku", "veja", "geina"], correct: "geina" },
      { sample: "🐑", comparisons: ["virakoku", "unture", "geina", "veja"], correct: "veja" },
      { sample: "🐐", comparisons: ["unture", "geina", "veja", "chivakoku"], correct: "chivakoku" },
      { sample: "🦃", comparisons: ["geina", "unture", "chivakoku", "virakoku"], correct: "unture" }

    ];

    function mts_comprension_trial(trial, session_id) {

      return {

        type: jsPsychHtmlKeyboardResponse,
        choices: "NO_KEYS",

        stimulus: `

    <div style="font-size:110px;margin-bottom:40px;">
      ${trial.sample}
    </div>

    <div>
      ${trial.comparisons.map(c =>
          `<button class="jspsych-btn syll" data-choice="${c}">${c}</button>`
        ).join("")}
    </div>

    `,

        on_load: () => {

          const t0 = performance.now();

          document.querySelectorAll(".syll").forEach(btn => {

            btn.onclick = () => {

              const choice = btn.dataset.choice;

              jsPsych.finishTrial({

                task: "mts_comprension",
                session: session_id,
                sample: trial.sample,
                comparisons: trial.comparisons,
                response: choice,
                correct: choice === trial.correct ? 1 : 0,
                rt: performance.now() - t0

              });

            };

          });

        },

        on_finish: data => {

          session_trials++;

          if (data.correct === 1) {
            session_correct++;
          }

          data_rows.push({

            participant_id: jsPsych.data.get().values()[0].participant_id,
            session: currentSession,
            sample: data.sample,

            comparisons1: data.comparisons[0],
            comparisons2: data.comparisons[1],
            comparisons3: data.comparisons[2],
            comparisons4: data.comparisons[3],

            response: data.response,
            correct: data.correct,
            rt: data.rt,
            task: "comprension"


          });

        }

      };

    }

    function buildWordBlock(session_trials, session_id) {

      let timeline = [];


      session_trials.forEach(trial => {
        timeline.push(
          mts_comprension_trial(trial, session_id),
          feedback_trial
        );
      });

      return timeline;

    }


    function buildWordTrainingSession() {

      session_id++;
      session_correct = 0;
      session_trials = 0;


      const trials = buildSession(comprension, 2);
      trials_per_session = trials.length;

      return buildWordBlock(trials, session_id);

    }

    const word_training_session = buildWordTrainingSession();


    const criterion_loop_comprension = {

      timeline: word_training_session,

      loop_function: function () {

        trials_per_session = jsPsych.data.get().filter({ session: session_id }).values().length || trials_per_session;
        const accuracy = session_correct / session_trials;

        console.log("session", currentSession);
        console.log("correct", session_correct);
        console.log("trials", session_trials);
        console.log("accuracy", accuracy);

        const repeat = accuracy < 0.8;

        session_correct = 0;
        session_trials = 0;
        if (repeat) {
          session_id++;
          currentSession++;
        }

        return repeat;

      }
    };

    //
    /* ================= LECTURA TEXTUAL ================= */

    const textual = [

      { sample: "uti", comparisons: ["uti", "sisio", "ziko", "urakʉ"], correct: "uti" },
      { sample: "urakʉ", comparisons: ["gei", "uti", "sisio", "urakʉ"], correct: "urakʉ" },
      { sample: "ziko", comparisons: ["uti", "gei", "urakʉ", "ziko"], correct: "ziko" },
      { sample: "gei", comparisons: ["uti", "urakʉ", "ziko", "gei"], correct: "gei" },

      { sample: "zamʉ", comparisons: ["zamʉ", "trumʉ", "mäniu", "kän"], correct: "zamʉ" },
      { sample: "trumʉ", comparisons: ["mäniu", "zamʉ", "trumʉ", "kän"], correct: "trumʉ" },
      { sample: "kän", comparisons: ["mäniu", "kän", "zamʉ", "trumʉ"], correct: "kän" },
      { sample: "mäniu", comparisons: ["mäniu", "mura", "maku", "zamʉ"], correct: "mäniu" },

      { sample: "potiri", comparisons: ["potiri", "perʉ", "paka", "chinu"], correct: "potiri" },
      { sample: "perʉ", comparisons: ["perʉ", "paka", "pitu", "chinu"], correct: "perʉ" },
      { sample: "paka", comparisons: ["paka", "pitu", "chinu", "yugu"], correct: "paka" },
      { sample: "yugu", comparisons: ["pitu", "kumeitʉ", "yutimbiro", "yugu"], correct: "yugu" },
      { sample: "kumeitʉ", comparisons: ["pitu", "yugu", "kumeitʉ", "yutimbiro"], correct: "kumeitʉ" },
    
      { sample: "yevʉ", comparisons: ["yevʉ", "yutimbiro", "yugu", "yui"], correct: "yevʉ" },
      { sample: "yui", comparisons: ["yui", "yevʉ", "yutimbiro", "yugu"], correct: "yui" },
      { sample: "tima", comparisons: ["tima", "kumeitʉ", "pitu", "misi"], correct: "tima" },
    
      { sample: "geina", comparisons: ["geina", "veja", "te", "chivakoku"], correct: "geina" },
      { sample: "veja", comparisons: ["wo", "veja", "chivakoku", "va"], correct: "veja" },
    
    ];

    function mts_textual(trial, session_id) {
      return {
        type: jsPsychHtmlKeyboardResponse,
        choices: "NO_KEYS",

        stimulus: `
      <div style="margin-bottom:30px;">
        <button id="play-sample" class="jspsych-btn"
        style="width:120px;height:120px;font-size:30px;"></button>
      </div>

      <div id="comparisons" style="display:none;">
        ${trial.comparisons.map(c =>
          `<button class="jspsych-btn syll" data-choice="${c}">${c}</button>`
        ).join("")}
      </div>
    `,

        on_load: () => {

          const t0 = performance.now();

          const playBtn = document.querySelector("#play-sample");
          const compDiv = document.querySelector("#comparisons");

          playBtn.onclick = () => {

            speak(trial.sample);

            // evitar múltiples clics
            playBtn.disabled = true;

            // mostrar comparaciones después de 0.5 s
            setTimeout(() => {
              compDiv.style.display = "block";
            }, 500);

          };

          document.querySelectorAll(".syll").forEach(btn => {
            btn.onclick = () => {

              const choice = btn.dataset.choice;

              jsPsych.finishTrial({
                task: "textual",
                session: session_id,
                sample: trial.sample,
                comparisons: trial.comparisons,
                response: choice,
                correct: choice === trial.correct ? 1 : 0,
                rt: performance.now() - t0
              });

            };
          });

        },

        on_finish: data => {

          session_trials++;

          if (data.correct === 1) {
            session_correct++;
          }
          data_rows.push(
            {
              participant_id: jsPsych.data.get().values()[0].participant_id,
              session: currentSession,
              sample: data.sample,

              comparisons1: data.comparisons[0],
              comparisons2: data.comparisons[1],
              comparisons3: data.comparisons[2],
              comparisons4: data.comparisons[3],

              response: data.response,
              correct: data.correct,
              rt: data.rt,
              task: "textual"
            }
          );

        }
      };
    }
    function buildTextualBlock(session_trials, session_id) {

      let timeline = [];

      session_trials.forEach(trial => {
        timeline.push(
          mts_textual(trial, session_id),
          feedback_trial
        );
      });

      return timeline;

    }

    function buildTextualTrainingSession() {

      session_id++;
      session_correct = 0;
      session_trials = 0;

      const trials = buildSession(textual, 2);
      trials_per_session = trials.length;

      return buildTextualBlock(trials, session_id);

    }

    const textual_training_session = buildTextualTrainingSession();

    const criterion_loop_textual = {

      timeline: textual_training_session,

      loop_function: function () {

        trials_per_session = jsPsych.data.get().filter({ session: session_id }).values().length || trials_per_session;
        const accuracy = session_correct / session_trials;

        console.log("session", currentSession);
        console.log("correct", session_correct);
        console.log("trials", session_trials);
        console.log("accuracy", accuracy);

        const repeat = accuracy < 0.8;

        session_correct = 0;
        session_trials = 0;
        if (repeat) {
          session_id++;
          currentSession++;
        }

        return repeat;
      }

    };

    /// ================= FINAL =================  
    function exportDataToExcel(participant_id) {

      const worksheet = XLSX.utils.json_to_sheet(data_rows);
      const workbook = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(workbook, worksheet, "Resultados");

      const date = new Date()
        .toISOString()
        .replace(/[:.]/g, "-")
        .replace("T", "_")
        .slice(0, 19);

      const filename = `MTS_${participant_id}_${date}.xlsx`;

      XLSX.writeFile(workbook, filename);
    }

    /* ================= Timeline principal ================= */

    const main_timeline = [
      participant_id_trial,
      criterion_loop_comprension,
      criterion_loop,
      criterion_loop_comprension,
      criterion_loop_textual,
      final_message
    ];

    jsPsych.data.reset();
    jsPsych.run(main_timeline);



  </script>
</body>

</html>
